[package]
name = "cs2-demo-botmimic-converter"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"
publish = false

[workspace]

[features]
default = ["demoparser", "gui"]
demoparser = ["dep:ahash", "dep:parser"]
gui = ["dep:eframe", "dep:rfd"]

[lib]
name = "cs2_demo_botmimic_converter"
path = "src/lib.rs"

[dependencies]
ahash = { version = "0.8", optional = true }
clap = { version = "4.5", features = ["derive"] }
eframe = { version = "0.27", optional = true }
rfd = { version = "0.14", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[dependencies.parser]
path = "../third_party/demoparser/src/parser"
optional = true
