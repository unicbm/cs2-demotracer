name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Check converter formatting
        working-directory: converter
        run: cargo fmt --check

      - name: Check converter workspace
        working-directory: converter
        run: cargo check --workspace --locked

      - name: Check converter CLI binary
        working-directory: converter
        run: cargo check --locked --no-default-features --features cli,demoparser --bin cs2-demotracer

      - name: Test converter
        working-directory: converter
        run: cargo test --locked

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm.cmd ci

      - name: Check desktop frontend
        working-directory: desktop
        run: npm.cmd run check

      - name: Build desktop frontend
        working-directory: desktop
        run: npm.cmd run build

      - name: Check desktop Rust formatting
        working-directory: desktop/src-tauri
        run: cargo fmt --check

      - name: Test desktop Rust backend
        working-directory: desktop/src-tauri
        run: cargo test --locked

      - name: Build desktop GUI
        working-directory: desktop
        run: npm.cmd run tauri:build -- --target x86_64-pc-windows-msvc -- --locked

      - name: Build CSS plugin
        run: dotnet build css\DemoTracer\DemoTracer.csproj -c Release

      - name: Check public-source hygiene
        shell: pwsh
        run: |
          $forbiddenTracked = git ls-files |
            Where-Object {
              $_ -match '(^|/)(target|bin|obj|tmp|output)(/|$)' -or
              $_ -match '\.(dem|dtr|cs2rec|log)$'
            }
          if ($forbiddenTracked) {
            Write-Error "tracked generated/private artifacts are not allowed:`n$($forbiddenTracked -join "`n")"
            exit 1
          }

          $browserTargetDir = Join-Path "converter" ("wa" + "sm")
          if (Test-Path $browserTargetDir) {
            Write-Error "unexpected browser-target converter directory: $browserTargetDir"
            exit 1
          }

          $hits = git grep -n -E 'C:\\Users\\|[Ww][Aa][Ss][Mm]|[Cc]urrent writer format is `\.dtr` v4' -- . ':!converter/Cargo.lock' ':!desktop/src-tauri/Cargo.lock' ':!desktop/package-lock.json'
          if ($LASTEXITCODE -eq 1) {
            exit 0
          }
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $hits
          exit 1

      - name: Check diff whitespace
        run: git diff --check
